apiVersion: v1
kind: ConfigMap
metadata:
  name: cyberfaces-rag-config
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
data:
  PYTHONUNBUFFERED: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cyberfaces-chromadb-pvc
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberfaces-rag
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberfaces-rag
  template:
    metadata:
      labels:
        app: cyberfaces-rag
    spec:
      tolerations:
      - key: hub.jupyter.org/dedicated
        operator: Equal
        value: gpu
        effect: NoSchedule
      containers:
      - name: cyberfaces-rag
        image: registry.anvil.rcac.purdue.edu/cyberfaces/cyberfaces-rag:<GITSHA>
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: cyberfaces-rag-config
              key: PYTHONUNBUFFERED
        - name: ANVILGPT_API
          valueFrom:
            secretKeyRef:
              name: cyberfaces-rag-secrets
              key: anvilgpt-api
        - name: DATA_FILE_PATH
          value: "/data/current/data.jsonl"
        - name: CHROMADB_PATH
          value: "/data/chromaDB"
        volumeMounts:
        - name: chromadb-storage
          mountPath: /app/chromaDB
        - name: data-storage
          mountPath: /data
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
            nvidia.com/mig-1g.10gb: "1"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: chromadb-storage
        persistentVolumeClaim:
          claimName: cyberfaces-chromadb-pvc
      - name: data-storage
        persistentVolumeClaim:
          claimName: cyberfaces-rag-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cyberfaces-rag-service
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  type: ClusterIP
  selector:
    app: cyberfaces-rag
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
