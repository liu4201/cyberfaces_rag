apiVersion: v1
kind: ConfigMap
metadata:
  name: cyberfaces-rag-config
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
data:
  PYTHONUNBUFFERED: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cyberfaces-chromadb-pvc
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberfaces-rag
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberfaces-rag
  template:
    metadata:
      labels:
        app: cyberfaces-rag
    spec:
      containers:
      - name: cyberfaces-rag
        image: registry.anvil.rcac.purdue.edu/cyberfaces/cyberfaces-rag:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: cyberfaces-rag-config
              key: PYTHONUNBUFFERED
        # Add your .env variables here as environment variables
        # Example:
        # - name: API_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: cyberfaces-rag-secrets
        #       key: api-key
        volumeMounts:
        - name: chromadb-storage
          mountPath: /app/chromaDB
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
        # livenessProbe:
        #   httpGet:
        #     path: /docs
        #     port: 8000
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        #   timeoutSeconds: 5
        #   failureThreshold: 3
        # readinessProbe:
        #   httpGet:
        #     path: /docs
        #     port: 8000
        #   initialDelaySeconds: 10
        #   periodSeconds: 5
        #   timeoutSeconds: 3
        #   failureThreshold: 3
      volumes:
      - name: chromadb-storage
        persistentVolumeClaim:
          claimName: cyberfaces-chromadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cyberfaces-rag-service
  namespace: cyberfaces-dev
  labels:
    app: cyberfaces-rag
spec:
  type: ClusterIP
  selector:
    app: cyberfaces-rag
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
